<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no, viewport-fit=cover">
  <title>Timer Pengumuman Kelulusan Sekolah</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      margin: 0;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 30px 50px rgba(0, 20, 60, 0.15);
      padding: 28px 20px 35px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.6);
      transition: all 0.3s ease;
    }

    /* ============================================
       KONFIGURASI UKURAN LOGO (UBAH DI SINI SAJA)
       ============================================ */
    :root {
      /* Ukuran Logo Kiri */
      --logo-left-width: 150px;
      --logo-left-height: 150px;
      --logo-left-padding: 10px;
      --logo-left-border-radius: 50%;
      
      /* Ukuran Logo Kanan */
      --logo-right-width: 150px;
      --logo-right-height: 150px;
      --logo-right-padding: 6px;
      --logo-right-border-radius: 50%;
      
      /* Jarak antar logo */
      --logo-gap: 22px;
      
      /* Ukuran container masing-masing logo */
      --logo-left-container: 110px;
      --logo-right-container: 85px;
    }

    /* Container Logo - Dua logo bersebelahan */
    .logo-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--logo-gap);
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    /* Logo Kiri */
    .logo-item.left {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: var(--logo-left-container);
    }

    .logo-item.left img {
      width: var(--logo-left-width);
      height: var(--logo-left-height);
      object-fit: contain;
      border-radius: var(--logo-left-border-radius);
      background: #ffffff;
      padding: var(--logo-left-padding);
      box-shadow: 0 10px 20px rgba(0, 100, 200, 0.15);
      transition: transform 0.3s ease;
      display: block;
    }

    /* Logo Kanan */
    .logo-item.right {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: var(--logo-right-container);
    }

    .logo-item.right img {
      width: var(--logo-right-width);
      height: var(--logo-right-height);
      object-fit: contain;
      border-radius: var(--logo-right-border-radius);
      background: #ffffff;
      padding: var(--logo-right-padding);
      box-shadow: 0 10px 20px rgba(0, 100, 200, 0.15);
      transition: transform 0.3s ease;
      display: block;
    }

    /* Hover effect untuk semua logo */
    .logo-item img:hover {
      transform: scale(1.08);
    }

    .logo-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: #4a6fa5;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
      width: 100%;
    }

    /* Garis pemisah kecil antar logo */
    .logo-divider {
      width: 2px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, #cbd5e1, transparent);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Nama Sekolah */
    .school-name {
      font-size: clamp(1.6rem, 7vw, 2.4rem);
      font-weight: 700;
      color: #0b3b5e;
      margin-bottom: 18px;
      letter-spacing: 1px;
      line-height: 1.3;
      text-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .school-name i {
      color: #f59e0b;
      margin-right: 6px;
      font-size: 0.9em;
    }

    /* Foto Para Guru - 1 Foto Besar */
    .teachers-photo {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 12px;
      padding: 5px 0;
    }

    .single-teacher-photo {
      width: 100%;
      max-width: 400px;
      height: auto;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 24px;
      border: 4px solid white;
      box-shadow: 0 12px 25px rgba(0, 80, 150, 0.25);
      transition: transform 0.3s ease;
      background: #d9eafb;
    }

    .single-teacher-photo:hover {
      transform: scale(1.02);
    }

    /* Garis Pembatas */
    .divider {
      width: 70%;
      height: 4px;
      background: linear-gradient(to right, transparent, #1e88e5, #0d47a1, #1e88e5, transparent);
      margin: 20px auto 25px;
      border-radius: 4px;
      opacity: 0.8;
    }

    /* Judul Timer */
    .timer-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1e3a5f;
      margin-bottom: 18px;
      letter-spacing: 0.8px;
      transition: all 0.4s ease;
    }

    /* Countdown Grid */
    .countdown {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px 18px;
      margin: 10px 0 15px;
      transition: all 0.5s ease;
    }

    .time-box {
      background: #ffffff;
      border-radius: 24px;
      padding: 18px 8px;
      min-width: 70px;
      flex: 1 1 65px;
      max-width: 100px;
      background: linear-gradient(180deg, #ffffff 0%, #f3f9ff 100%);
      box-shadow: 0 12px 25px rgba(0, 82, 155, 0.2);
      border: 1px solid rgba(66, 153, 225, 0.25);
      transition: transform 0.2s;
    }

    .time-box:hover {
      transform: translateY(-3px);
    }

    .time-number {
      font-size: clamp(2.2rem, 10vw, 3.5rem);
      font-weight: 700;
      color: #003a70;
      line-height: 1;
      display: block;
      text-shadow: 0 2px 8px rgba(0,122,204,0.2);
      font-feature-settings: "tnum";
      letter-spacing: 1px;
    }

    .time-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #2c5282;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-top: 6px;
      display: block;
    }

    /* Keterangan target */
    .target-info {
      margin-top: 22px;
      font-size: 0.9rem;
      color: #2d4a6e;
      background: #e6f0fc;
      display: inline-block;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 500;
      backdrop-filter: blur(5px);
      transition: all 0.4s ease;
    }

    .target-info i {
      margin-right: 6px;
      color: #b45309;
    }

    /* Tombol Link Pengumuman */
    .announcement-link-wrapper {
      margin-top: 25px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      pointer-events: none;
      height: 0;
      overflow: hidden;
    }

    .announcement-link-wrapper.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      height: auto;
      overflow: visible;
    }

    .announcement-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #1e88e5, #0d47a1);
      color: white;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      box-shadow: 0 10px 30px rgba(13, 71, 161, 0.4);
      transition: all 0.3s ease;
      border: 2px solid transparent;
      animation: pulse-button 2s infinite;
    }

    .announcement-link:hover {
      background: linear-gradient(135deg, #42a5f5, #1565c0);
      box-shadow: 0 15px 35px rgba(13, 71, 161, 0.6);
      transform: translateY(-3px) scale(1.03);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .announcement-link:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 5px 15px rgba(13, 71, 161, 0.4);
    }

    .announcement-link i {
      font-size: 1.3rem;
      animation: bounce-icon 1.5s infinite;
    }

    @keyframes pulse-button {
      0%, 100% {
        box-shadow: 0 10px 30px rgba(13, 71, 161, 0.4);
      }
      50% {
        box-shadow: 0 10px 45px rgba(13, 71, 161, 0.7), 0 0 0 8px rgba(30, 136, 229, 0.15);
      }
    }

    @keyframes bounce-icon {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-5px);
      }
    }

    /* Pesan selamat */
    .congrats-message {
      margin-top: 15px;
      font-size: 1rem;
      font-weight: 600;
      color: #0b5e2e;
      background: #e8f5e9;
      display: inline-block;
      padding: 10px 24px;
      border-radius: 40px;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.5s ease;
    }

    .congrats-message.show {
      opacity: 1;
      transform: scale(1);
    }

    /* Responsif untuk smartphone kecil */
    @media (max-width: 420px) {
      :root {
        /* Ukuran logo di mobile */
        --logo-left-width: 70px;
        --logo-left-height: 70px;
        --logo-left-padding: 7px;
        --logo-left-container: 85px;
        
        --logo-right-width: 55px;
        --logo-right-height: 55px;
        --logo-right-padding: 5px;
        --logo-right-container: 70px;
        
        --logo-gap: 14px;
      }
      
      .container {
        padding: 20px 14px 28px;
      }
      .logo-divider {
        height: 45px;
      }
      .single-teacher-photo {
        max-width: 100%;
        border-radius: 20px;
      }
      .time-box {
        min-width: 60px;
        padding: 14px 4px;
      }
      .announcement-link {
        padding: 14px 24px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    
    <div class="logo-container">
      <div class="logo-item left">
        <img src="f8e6ecfffeec0006740517c52a6c6424-removebg-preview.png" 
             alt="Logo Sekolah" 
             onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%234285d1%22/%3E%3Ctext x=%2250%22 y=%2265%22 font-size=%2245%22 text-anchor=%22middle%22 fill=%22white%22%3E🏫%3C/text%3E%3C/svg%3E';">
        <span class="logo-label"></span>
      </div>

      <div class="logo-divider"></div>

      <div class="logo-item right">
        <img src="Logo_SMAN_1_PKL_Lesung_HD_ (1).png" 
             alt="Logo Kedua" 
             onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%23f59e0b%22/%3E%3Ctext x=%2250%22 y=%2265%22 font-size=%2245%22 text-anchor=%22middle%22 fill=%22white%22%3E🎓%3C/text%3E%3C/svg%3E';">
        <span class="logo-label"></span>
      </div>
    </div>

    <div class="school-name">
      <i class=""></i> SMA NEGERI 1 PANGKALAN LESUNG
    </div>

    <div class="teachers-photo">
      <img src="KAM02367.JPG" 
           alt="Foto Para Guru" 
           class="single-teacher-photo"
           loading="lazy"
           onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22%3E%3Crect width=%22400%22 height=%22300%22 fill=%22%23e2e8f0%22/%3E%3Ctext x=%22200%22 y=%22160%22 font-size=%2220%22 text-anchor=%22middle%22 fill=%22%23475569%22%3EFoto Guru%3C/text%3E%3C/svg%3E';">
    </div>

    <div class="divider"></div>

    <div class="timer-title" id="timerTitle">
      <i class="far fa-clock"></i> PENGUMUMAN KELULUSAN TINGGAL
    </div>

    <div class="countdown" id="countdown">
      <div class="time-box">
        <span class="time-number" id="days">00</span>
        <span class="time-label">Hari</span>
      </div>
      <div class="time-box">
        <span class="time-number" id="hours">00</span>
        <span class="time-label">Jam</span>
      </div>
      <div class="time-box">
        <span class="time-number" id="minutes">00</span>
        <span class="time-label">Menit</span>
      </div>
      <div class="time-box">
        <span class="time-number" id="seconds">00</span>
        <span class="time-label">Detik</span>
      </div>
    </div>

    <div class="target-info" id="targetInfo">
      <i class="fas fa-calendar-check"></i> 
      <span id="targetDateDisplay">4 Mei 2026, 20:30 WIB</span>
    </div>

    <div class="congrats-message" id="congratsMessage">
      <i class="fas fa-party-horn"></i> Selamat! Pengumuman telah tiba! 🎉
    </div>

    <div class="announcement-link-wrapper" id="announcementLinkWrapper">
      <a href="https://sman1pangkalanlesung.github.io/kelulusan..sch.id/" 
         target="_blank" 
         rel="noopener noreferrer" 
         class="announcement-link">
        <i class="fas fa-external-link-alt"></i> 
        Lihat Pengumuman Kelulusan
        <i class="fas fa-arrow-right"></i>
      </a>
    </div>

  </div>

  <script>
    (function() {
      // ============================================
      // KONFIGURASI
      // ============================================
      
      // 📅 Tanggal target: 4 Mei 2026, 20:30 WIB (jam 8.30 malam)
      // WIB = UTC+7 → 20:30 - 7 jam = 13:30 UTC
      const targetUTC = Date.UTC(2026, 4, 4, 13, 30, 0);
      
      const websiteURL = "https://sman1pangkalanlesung.github.io/kelulusan..sch.id/";
      const buttonText = "Lihat Pengumuman Kelulusan";
      
      const announcementLink = document.querySelector('.announcement-link');
      if (announcementLink) {
        announcementLink.href = websiteURL;
        announcementLink.innerHTML = `<i class="fas fa-external-link-alt"></i> ${buttonText} <i class="fas fa-arrow-right"></i>`;
      }
      
      const targetDisplayElement = document.getElementById('targetDateDisplay');
      if (targetDisplayElement) {
        targetDisplayElement.textContent = '4 Mei 2026, 20:30 WIB';
      }

      const daysElement = document.getElementById('days');
      const hoursElement = document.getElementById('hours');
      const minutesElement = document.getElementById('minutes');
      const secondsElement = document.getElementById('seconds');
      const timerTitle = document.getElementById('timerTitle');
      const targetInfo = document.getElementById('targetInfo');
      const announcementLinkWrapper = document.getElementById('announcementLinkWrapper');
      const congratsMessage = document.getElementById('congratsMessage');
      const countdownElement = document.getElementById('countdown');

      let isCountdownFinished = false;

      function padZero(number) {
        return number < 10 ? '0' + number : number;
      }

      function showAnnouncementLink() {
        if (!isCountdownFinished) {
          isCountdownFinished = true;
          
          if (timerTitle) {
            timerTitle.innerHTML = '<i class="fas fa-check-circle"></i> PENGUMUMAN TELAH DIBUKA!';
            timerTitle.style.color = '#0b5e2e';
          }
          
          if (targetInfo) {
            targetInfo.innerHTML = '<i class="fas fa-check-circle"></i> <span>Saatnya melihat hasil kelulusan!</span>';
            targetInfo.style.background = '#e8f5e9';
            targetInfo.style.color = '#0b5e2e';
          }
          
          if (countdownElement) {
            countdownElement.style.opacity = '0.5';
            countdownElement.style.transform = 'scale(0.95)';
          }
          
          if (congratsMessage) {
            setTimeout(() => {
              congratsMessage.classList.add('show');
            }, 300);
          }
          
          if (announcementLinkWrapper) {
            setTimeout(() => {
              announcementLinkWrapper.classList.add('show');
              announcementLinkWrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 600);
          }
        }
      }

      function updateCountdown() {
        const nowUTC = Date.now();
        const distance = targetUTC - nowUTC;

        if (distance <= 0) {
          if (daysElement) daysElement.textContent = '00';
          if (hoursElement) hoursElement.textContent = '00';
          if (minutesElement) minutesElement.textContent = '00';
          if (secondsElement) secondsElement.textContent = '00';
          
          showAnnouncementLink();
          return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        if (daysElement) daysElement.textContent = padZero(days);
        if (hoursElement) hoursElement.textContent = padZero(hours);
        if (minutesElement) minutesElement.textContent = padZero(minutes);
        if (secondsElement) secondsElement.textContent = padZero(seconds);
        
        if (distance <= 10000 && distance > 0) {
          if (secondsElement) {
            secondsElement.style.color = '#e53935';
            secondsElement.style.animation = 'none';
            secondsElement.offsetHeight;
            secondsElement.style.animation = 'blink 0.5s infinite';
          }
        }
      }

      const blinkStyle = document.createElement('style');
      blinkStyle.textContent = `
        @keyframes blink {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.3; }
        }
      `;
      document.head.appendChild(blinkStyle);

      updateCountdown();

      const timerInterval = setInterval(updateCountdown, 1000);

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          updateCountdown();
        }
      });

      window.addEventListener('beforeunload', () => {
        clearInterval(timerInterval);
      });
      
      if (Date.now() >= targetUTC) {
        showAnnouncementLink();
      }
      
    })();
  </script>
</body>
</html>
