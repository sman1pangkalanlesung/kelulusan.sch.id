<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no, viewport-fit=cover">
  <title>Timer Pengumuman Kelulusan Sekolah</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      margin: 0;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 30px 50px rgba(0, 20, 60, 0.15);
      padding: 28px 20px 35px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.6);
      transition: all 0.3s ease;
    }

    /* Container Logo - Dua logo bersebelahan */
    .logo-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .logo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .logo-item img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      border-radius: 50%;
      background: #f8fcff;
      padding: 8px;
      box-shadow: 0 10px 20px rgba(0, 100, 200, 0.15);
      background: white;
      transition: transform 0.3s ease;
    }

    .logo-item img:hover {
      transform: scale(1.08);
    }

    .logo-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: #4a6fa5;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Garis pemisah kecil antar logo */
    .logo-divider {
      width: 2px;
      height: 50px;
      background: linear-gradient(to bottom, transparent, #cbd5e1, transparent);
      border-radius: 2px;
    }

    /* Nama Sekolah */
    .school-name {
      font-size: clamp(1.6rem, 7vw, 2.4rem);
      font-weight: 700;
      color: #0b3b5e;
      margin-bottom: 18px;
      letter-spacing: 1px;
      line-height: 1.3;
      text-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .school-name i {
      color: #f59e0b;
      margin-right: 6px;
      font-size: 0.9em;
    }

    /* Foto Para Guru - 1 Foto Besar */
    .teachers-photo {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 12px;
      padding: 5px 0;
    }

    .single-teacher-photo {
      width: 100%;
      max-width: 400px;
      height: auto;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 24px;
      border: 4px solid white;
      box-shadow: 0 12px 25px rgba(0, 80, 150, 0.25);
      transition: transform 0.3s ease;
      background: #d9eafb;
    }

    .single-teacher-photo:hover {
      transform: scale(1.02);
    }

    /* Garis Pembatas */
    .divider {
      width: 70%;
      height: 4px;
      background: linear-gradient(to right, transparent, #1e88e5, #0d47a1, #1e88e5, transparent);
      margin: 20px auto 25px;
      border-radius: 4px;
      opacity: 0.8;
    }

    /* Judul Timer */
    .timer-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1e3a5f;
      margin-bottom: 18px;
      letter-spacing: 0.8px;
      transition: all 0.4s ease;
    }

    /* Countdown Grid */
    .countdown {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px 18px;
      margin: 10px 0 15px;
      transition: all 0.5s ease;
    }

    .time-box {
      background: #ffffff;
      border-radius: 24px;
      padding: 18px 8px;
      min-width: 70px;
      flex: 1 1 65px;
      max-width: 100px;
      background: linear-gradient(180deg, #ffffff 0%, #f3f9ff 100%);
      box-shadow: 0 12px 25px rgba(0, 82, 155, 0.2);
      border: 1px solid rgba(66, 153, 225, 0.25);
      transition: transform 0.2s;
    }

    .time-box:hover {
      transform: translateY(-3px);
    }

    .time-number {
      font-size: clamp(2.2rem, 10vw, 3.5rem);
      font-weight: 700;
      color: #003a70;
      line-height: 1;
      display: block;
      text-shadow: 0 2px 8px rgba(0,122,204,0.2);
      font-feature-settings: "tnum";
      letter-spacing: 1px;
    }

    .time-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #2c5282;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-top: 6px;
      display: block;
    }

    /* Keterangan target */
    .target-info {
      margin-top: 22px;
      font-size: 0.9rem;
      color: #2d4a6e;
      background: #e6f0fc;
      display: inline-block;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 500;
      backdrop-filter: blur(5px);
      transition: all 0.4s ease;
    }

    .target-info i {
      margin-right: 6px;
      color: #b45309;
    }

    /* ========== BAGIAN BARU: Tombol Link Pengumuman ========== */
    .announcement-link-wrapper {
      margin-top: 25px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      pointer-events: none;
      height: 0;
      overflow: hidden;
    }

    /* Class yang akan ditambahkan saat countdown habis */
    .announcement-link-wrapper.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      height: auto;
      overflow: visible;
    }

    .announcement-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #1e88e5, #0d47a1);
      color: white;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      box-shadow: 0 10px 30px rgba(13, 71, 161, 0.4);
      transition: all 0.3s ease;
      border: 2px solid transparent;
      animation: pulse-button 2s infinite;
    }

    .announcement-link:hover {
      background: linear-gradient(135deg, #42a5f5, #1565c0);
      box-shadow: 0 15px 35px rgba(13, 71, 161, 0.6);
      transform: translateY(-3px) scale(1.03);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .announcement-link:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 5px 15px rgba(13, 71, 161, 0.4);
    }

    .announcement-link i {
      font-size: 1.3rem;
      animation: bounce-icon 1.5s infinite;
    }

    /* Animasi tombol berdenyut */
    @keyframes pulse-button {
      0%, 100% {
        box-shadow: 0 10px 30px rgba(13, 71, 161, 0.4);
      }
      50% {
        box-shadow: 0 10px 45px rgba(13, 71, 161, 0.7), 0 0 0 8px rgba(30, 136, 229, 0.15);
      }
    }

    /* Animasi ikon melambung */
    @keyframes bounce-icon {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-5px);
      }
    }

    /* Pesan selamat */
    .congrats-message {
      margin-top: 15px;
      font-size: 1rem;
      font-weight: 600;
      color: #0b5e2e;
      background: #e8f5e9;
      display: inline-block;
      padding: 10px 24px;
      border-radius: 40px;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.5s ease;
    }

    .congrats-message.show {
      opacity: 1;
      transform: scale(1);
    }

    /* Responsif untuk smartphone kecil */
    @media (max-width: 420px) {
      .container {
        padding: 20px 14px 28px;
      }
      .logo-container {
        gap: 12px;
      }
      .logo-item img {
        width: 65px;
        height: 65px;
        padding: 6px;
      }
      .logo-divider {
        height: 40px;
      }
      .single-teacher-photo {
        max-width: 100%;
        border-radius: 20px;
      }
      .time-box {
        min-width: 60px;
        padding: 14px 4px;
      }
      .announcement-link {
        padding: 14px 24px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    
    <!-- 1. Dua Logo Bersebelahan -->
    <div class="logo-container">
      <!-- Logo Pertama (Kiri) -->
      <div class="logo-item">
        <!-- 🖼️ GANTI src dengan logo pertama (contoh: logo sekolah) -->
        <img src="https://img.icons8.com/clouds/100/000000/school.png" 
             alt="Logo Sekolah" 
             onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%234285d1%22/%3E%3Ctext x=%2250%22 y=%2265%22 font-size=%2245%22 text-anchor=%22middle%22 fill=%22white%22%3E🏫%3C/text%3E%3C/svg%3E';">
        <span class="logo-label">Sekolah</span>
      </div>

      <!-- Garis pemisah vertikal -->
      <div class="logo-divider"></div>

      <!-- Logo Kedua (Kanan) -->
      <div class="logo-item">
        <!-- 🖼️ GANTI src dengan logo kedua (contoh: logo yayasan / dinas / OSIS) -->
        <img src="https://img.icons8.com/clouds/100/000000/graduation-cap.png" 
             alt="Logo Kedua" 
             onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%23f59e0b%22/%3E%3Ctext x=%2250%22 y=%2265%22 font-size=%2245%22 text-anchor=%22middle%22 fill=%22white%22%3E🎓%3C/text%3E%3C/svg%3E';">
        <span class="logo-label">Akreditasi</span>
      </div>
    </div>

    <!-- 2. Nama Sekolah -->
    <div class="school-name">
      <i class="fas fa-graduation-cap"></i> SMA NEGERI 1 HARAPAN BANGSA
    </div>

    <!-- 3. Foto Para Guru - 1 Foto Besar -->
    <div class="teachers-photo">
      <!-- ⚠️ GANTI src dengan foto guru kamu -->
      <img src="KAM02367.JPG" 
           alt="Foto Para Guru" 
           class="single-teacher-photo"
           loading="lazy"
           onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22%3E%3Crect width=%22400%22 height=%22300%22 fill=%22%23e2e8f0%22/%3E%3Ctext x=%22200%22 y=%22160%22 font-size=%2220%22 text-anchor=%22middle%22 fill=%22%23475569%22%3EFoto Guru%3C/text%3E%3C/svg%3E';">
    </div>

    <!-- 4. Garis Pembatas -->
    <div class="divider"></div>

    <!-- 5. Countdown Timer Besar -->
    <div class="timer-title" id="timerTitle">
      <i class="far fa-clock"></i> PENGUMUMAN KELULUSAN TINGGAL
    </div>

    <div class="countdown" id="countdown">
      <div class="time-box">
        <span class="time-number" id="days">00</span>
        <span class="time-label">Hari</span>
      </div>
      <div class="time-box">
        <span class="time-number" id="hours">00</span>
        <span class="time-label">Jam</span>
      </div>
      <div class="time-box">
        <span class="time-number" id="minutes">00</span>
        <span class="time-label">Menit</span>
      </div>
      <div class="time-box">
        <span class="time-number" id="seconds">00</span>
        <span class="time-label">Detik</span>
      </div>
    </div>

    <div class="target-info" id="targetInfo">
      <i class="fas fa-calendar-check"></i> 
      <span id="targetDateDisplay">3 Mei 2026, 23:00 WIB</span>
    </div>

    <!-- 🌟 Pesan Selamat (muncul saat countdown habis) -->
    <div class="congrats-message" id="congratsMessage">
      <i class="fas fa-party-horn"></i> Selamat! Pengumuman telah tiba! 🎉
    </div>

    <!-- 🔗 Tombol Link Website Utama (muncul saat countdown habis) -->
    <div class="announcement-link-wrapper" id="announcementLinkWrapper">
      <!-- ⚠️ GANTI href dengan URL website utama kamu -->
      <a href="https://www.sekolahimpian.sch.id/pengumuman" 
         target="_blank" 
         rel="noopener noreferrer" 
         class="announcement-link">
        <i class="fas fa-external-link-alt"></i> 
        Lihat Pengumuman Kelulusan
        <i class="fas fa-arrow-right"></i>
      </a>
    </div>

  </div>

  <script>
    (function() {
      // ============================================
      // KONFIGURASI - BAGIAN YANG BISA KAMU UBAH
      // ============================================
      
      // 📅 Tanggal target pengumuman (WIB = UTC+7)
      // Format: Date.UTC(Tahun, Bulan, Hari, Jam_UTC, Menit, Detik)
      // 3 Mei 2026, 23:00 WIB -> 3 Mei 2026, 16:00 UTC
      // (23:00 WIB - 7 jam = 16:00 UTC)
      const targetUTC = Date.UTC(2026, 4, 3, 16, 0, 0); // Bulan Mei = 4 (0-index), jam 16 UTC = 23 WIB
      
      // 🔗 URL website utama yang akan dibuka saat tombol diklik
      const websiteURL = "https://www.sekolahimpian.sch.id/pengumuman";
      
      // 📝 Teks yang muncul di tombol
      const buttonText = "Lihat Pengumuman Kelulusan";
      
      // ============================================
      
      // Set URL tombol
      const announcementLink = document.querySelector('.announcement-link');
      if (announcementLink) {
        announcementLink.href = websiteURL;
        announcementLink.innerHTML = `<i class="fas fa-external-link-alt"></i> ${buttonText} <i class="fas fa-arrow-right"></i>`;
      }
      
      // Tampilkan target tanggal
      const targetDisplayElement = document.getElementById('targetDateDisplay');
      if (targetDisplayElement) {
        targetDisplayElement.textContent = '3 Mei 2026, 23:00 WIB';
      }

      // Ambil elemen HTML
      const daysElement = document.getElementById('days');
      const hoursElement = document.getElementById('hours');
      const minutesElement = document.getElementById('minutes');
      const secondsElement = document.getElementById('seconds');
      const timerTitle = document.getElementById('timerTitle');
      const targetInfo = document.getElementById('targetInfo');
      const announcementLinkWrapper = document.getElementById('announcementLinkWrapper');
      const congratsMessage = document.getElementById('congratsMessage');
      const countdownElement = document.getElementById('countdown');

      // Flag untuk mengecek apakah countdown sudah selesai
      let isCountdownFinished = false;

      // Fungsi untuk menambahkan leading zero
      function padZero(number) {
        return number < 10 ? '0' + number : number;
      }

      // Fungsi untuk menampilkan tombol dan pesan
      function showAnnouncementLink() {
        if (!isCountdownFinished) {
          isCountdownFinished = true;
          
          // Ubah judul timer
          if (timerTitle) {
            timerTitle.innerHTML = '<i class="fas fa-check-circle"></i> PENGUMUMAN TELAH DIBUKA!';
            timerTitle.style.color = '#0b5e2e';
          }
          
          // Ubah target info
          if (targetInfo) {
            targetInfo.innerHTML = '<i class="fas fa-check-circle"></i> <span>Saatnya melihat hasil kelulusan!</span>';
            targetInfo.style.background = '#e8f5e9';
            targetInfo.style.color = '#0b5e2e';
          }
          
          // Sembunyikan countdown dengan animasi
          if (countdownElement) {
            countdownElement.style.opacity = '0.5';
            countdownElement.style.transform = 'scale(0.95)';
          }
          
          // Tampilkan pesan selamat
          if (congratsMessage) {
            setTimeout(() => {
              congratsMessage.classList.add('show');
            }, 300);
          }
          
          // Tampilkan tombol link dengan delay untuk efek dramatis
          if (announcementLinkWrapper) {
            setTimeout(() => {
              announcementLinkWrapper.classList.add('show');
              
              // Scroll ke tombol di mobile
              announcementLinkWrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 600);
          }
        }
      }

      // Fungsi utama menghitung selisih waktu
      function updateCountdown() {
        const nowUTC = Date.now();
        const distance = targetUTC - nowUTC;

        // Jika waktu sudah habis
        if (distance <= 0) {
          // Tampilkan 00 di semua angka
          if (daysElement) daysElement.textContent = '00';
          if (hoursElement) hoursElement.textContent = '00';
          if (minutesElement) minutesElement.textContent = '00';
          if (secondsElement) secondsElement.textContent = '00';
          
          // Tampilkan tombol dan pesan
          showAnnouncementLink();
          return;
        }

        // Perhitungan
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        // Update DOM
        if (daysElement) daysElement.textContent = padZero(days);
        if (hoursElement) hoursElement.textContent = padZero(hours);
        if (minutesElement) minutesElement.textContent = padZero(minutes);
        if (secondsElement) secondsElement.textContent = padZero(seconds);
        
        // Animasi kedip halus saat mendekati 10 detik terakhir
        if (distance <= 10000 && distance > 0) {
          if (secondsElement) {
            secondsElement.style.color = '#e53935';
            secondsElement.style.animation = 'none';
            secondsElement.offsetHeight; // Trigger reflow
            secondsElement.style.animation = 'blink 0.5s infinite';
          }
        }
      }

      // CSS tambahan untuk animasi kedip
      const blinkStyle = document.createElement('style');
      blinkStyle.textContent = `
        @keyframes blink {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.3; }
        }
        #seconds.blink-red {
          color: #e53935 !important;
        }
      `;
      document.head.appendChild(blinkStyle);

      // Jalankan pertama kali
      updateCountdown();

      // Update setiap detik
      const timerInterval = setInterval(updateCountdown, 1000);

      // Sinkronisasi saat tab aktif kembali
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          updateCountdown();
        }
      });

      // Bersihkan interval
      window.addEventListener('beforeunload', () => {
        clearInterval(timerInterval);
      });
      
      // Cek apakah countdown sudah lewat saat halaman pertama kali dimuat
      if (Date.now() >= targetUTC) {
        showAnnouncementLink();
      }
      
    })();
  </script>
</body>
</html>
